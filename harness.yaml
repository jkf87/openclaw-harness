# OpenClaw 하네스 마스터 설정
# 위치: ~/.openclaw/harness/harness.yaml
version: "1.0"
profile: standard  # minimal | standard | full

# ──────────────────────────────────────────────
# 프로파일별 활성 모듈
# ──────────────────────────────────────────────
profiles:
  minimal:
    description: "가드레일만 활성화 — 기존 워크플로 유지"
    modules: [rules, hooks]
    agents: []
    skills: []
    routing: false
    orchestration: false

  standard:
    description: "핵심 워크플로 스킬 + 가드레일 + 기본 라우팅"
    modules: [rules, hooks, skills, routing]
    agents: [planner, worker, reviewer]
    skills: [plan, work, review, debug]
    routing: true
    orchestration: false

  full:
    description: "팀 오케스트레이션 + 모델 라우팅 + 전체 스킬"
    modules: [rules, hooks, skills, routing, orchestration]
    agents: [planner, worker, reviewer, debugger]
    skills: [plan, work, review, debug, harness-work]
    routing: true
    orchestration: true

# ──────────────────────────────────────────────
# 글로벌 설정
# ──────────────────────────────────────────────
settings:
  language: ko                   # 기본 인터페이스 언어
  evidence_required: true        # 완료 주장 시 증거 필수
  auto_catalog: true             # 세션 시작 시 CATALOG.md 자동 갱신

# ──────────────────────────────────────────────
# 모델 라우팅 (WS4)
# ──────────────────────────────────────────────
routing:
  config_dir: routing/
  default_model: gpt-5.4-codex
  budget_profile: standard       # minimal | standard | full
  korean_detection: true         # 한국어 감지 → GLM 계열 힌트

# ──────────────────────────────────────────────
# 오케스트레이션 (WS3)
# ──────────────────────────────────────────────
orchestration:
  config_dir: orchestration/
  mode: auto                     # auto | solo | parallel | full
  max_workers: 5
  max_total_sessions: 8
  fix_loop_max: 3
  human_in_the_loop:
    plan_approval: true
    review_notification: true
    auto_fix: false
    progress_updates: true

# ──────────────────────────────────────────────
# 경로 설정
# ──────────────────────────────────────────────
paths:
  agents: agents/
  skills: skills/
  routing: routing/
  orchestration: orchestration/
  scripts: scripts/
  examples: examples/
  logs: logs/
