# OpenClaw 하네스 — 라우팅 규칙 (Z.ai 코딩플랜 멀티티어)
# 복잡도 × 카테고리 2D 매트릭스 + 플랜 인식 + Codex OAuth 옵션
version: "2.0-zai-multitier"

# ──────────────────────────────────────────────
# 복잡도 티어 임계값
# ──────────────────────────────────────────────
complexity_tiers:
  LOW:    { min: 0,  max: 4  }
  MEDIUM: { min: 5,  max: 9  }
  HIGH:   { min: 10, max: 20 }

# ──────────────────────────────────────────────
# 플랜별 라우팅 매트릭스
# (plans.yaml 의 active_plan 에 따라 선택)
# ──────────────────────────────────────────────
routing_matrix:

  # ════════════════════════════════════════════
  # LITE — GLM-5.1 사용 불가, glm-5로 상한
  # ════════════════════════════════════════════
  lite:
    coding_general: { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5 }
    coding_arch:    { LOW: glm-5,       MEDIUM: glm-5,       HIGH: glm-5 }
    korean_nlp:     { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5 }
    reasoning:      { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5 }
    debugging:      { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5 }
    content_creation: {LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5 }
    data_analysis:  { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5 }
    security:       { LOW: glm-5,       MEDIUM: glm-5,       HIGH: glm-5 }

  # ════════════════════════════════════════════
  # PRO — GLM-5.1 사용 가능, 표준 매트릭스
  # ════════════════════════════════════════════
  pro:
    coding_general: { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5.1 }
    coding_arch:    { LOW: glm-5,       MEDIUM: glm-5.1,     HIGH: glm-5.1 }
    korean_nlp:     { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5.1 }
    reasoning:      { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5.1 }
    debugging:      { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5.1 }
    content_creation: {LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5.1 }
    data_analysis:  { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5.1 }
    security:       { LOW: glm-5,       MEDIUM: glm-5.1,     HIGH: glm-5.1 }

  # ════════════════════════════════════════════
  # MAX — 적극적으로 GLM-5.1 사용
  # ════════════════════════════════════════════
  max:
    coding_general: { LOW: glm-5-turbo, MEDIUM: glm-5.1,     HIGH: glm-5.1 }
    coding_arch:    { LOW: glm-5.1,     MEDIUM: glm-5.1,     HIGH: glm-5.1 }
    korean_nlp:     { LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5.1 }
    reasoning:      { LOW: glm-5,       MEDIUM: glm-5.1,     HIGH: glm-5.1 }
    debugging:      { LOW: glm-5-turbo, MEDIUM: glm-5.1,     HIGH: glm-5.1 }
    content_creation: {LOW: glm-5-turbo, MEDIUM: glm-5,       HIGH: glm-5.1 }
    data_analysis:  { LOW: glm-5,       MEDIUM: glm-5.1,     HIGH: glm-5.1 }
    security:       { LOW: glm-5.1,     MEDIUM: glm-5.1,     HIGH: glm-5.1 }

# ──────────────────────────────────────────────
# Codex OAuth 활성 시 오버레이
# (plans.yaml의 codex_oauth_enabled == true)
# ──────────────────────────────────────────────
codex_overlay:
  enabled_when: "codex_oauth_enabled == true"
  # GPT-5.4 Codex는 reasoning_score=97 로 GLM-5.1(95)보다 소폭 우위.
  # extended_thinking 이 필요한 슬롯을 우선 오버레이한다.
  overrides:
    coding_arch:
      HIGH: gpt-5.4-codex
      MEDIUM: gpt-5.4-codex
    coding_general:
      HIGH: gpt-5.4-codex
    debugging:
      HIGH: gpt-5.4-codex
    security:
      HIGH: gpt-5.4-codex
      MEDIUM: gpt-5.4-codex
    reasoning:                         # 🆕 추론 카테고리도 오버레이
      HIGH: gpt-5.4-codex              # GPT-5.4 Codex 의 extended thinking 활용
    data_analysis:                     # 🆕 수학/추론 필요한 분석
      HIGH: gpt-5.4-codex

# ──────────────────────────────────────────────
# 우선순위 규칙 엔진 (first-match)
# ──────────────────────────────────────────────
routing_rules:
  - priority: 100
    name: user_override
    condition: "user_specified_model != null"
    action: use_user_specified_model

  - priority: 95
    name: plan_block
    condition: "selected_model not in active_plan.allowed_models"
    action: downgrade_to_allowed
    description: "활성 플랜이 미허용한 모델은 자동 강등 (예: Lite의 glm-5.1 → glm-5)"

  - priority: 90
    name: korean_high
    condition: "korean_ratio > 0.7 AND category in [korean_nlp, content_creation]"
    action: prefer_glm_korean
    description: "한국어 비율 높은 NLP/콘텐츠는 GLM 시리즈 우선"

  - priority: 85
    name: korean_mixed
    condition: "korean_ratio > 0.5 AND category in [korean_nlp, content_creation]"
    action: glm-5
    description: "한국어 혼합은 GLM-5"

  - priority: 82
    name: reasoning_heavy_codex
    condition: "codex_oauth_enabled AND reasoning_heavy == true AND complexity_tier == HIGH"
    action: gpt-5.4-codex
    description: "추론 집약(수학/논리/알고리즘) + Codex 활성 시 GPT-5.4 Codex 의 extended thinking 활용"

  - priority: 81
    name: reasoning_heavy_glm
    condition: "reasoning_heavy == true AND active_plan in [pro, max] AND complexity_tier >= MEDIUM"
    action: glm-5.1
    description: "추론 집약 태스크는 reasoning_score 최상위 모델(glm-5.1) 사용"

  - priority: 80
    name: codex_high_priority
    condition: "codex_oauth_enabled AND category in [coding_arch, security, reasoning, data_analysis] AND complexity_tier == HIGH"
    action: gpt-5.4-codex
    description: "Codex OAuth 활성 시 고난도 아키텍처/보안/추론/분석은 GPT-5.4 Codex"

  - priority: 75
    name: glm_advanced
    condition: "active_plan in [pro, max] AND complexity_tier == HIGH"
    action: glm-5.1
    description: "Pro/Max 의 HIGH 복잡도는 GLM-5.1"

  - priority: 70
    name: lite_high_cap
    condition: "active_plan == lite AND complexity_tier == HIGH"
    action: glm-5
    description: "Lite는 HIGH라도 glm-5 상한"

  - priority: 60
    name: medium_coding
    condition: "category in [coding_general, debugging] AND complexity_tier == MEDIUM"
    action: glm-5
    description: "표준 코딩/디버깅은 GLM-5"

  - priority: 50
    name: simple_task
    condition: "complexity_tier == LOW"
    action: glm-5-turbo
    description: "저복잡도는 GLM-5 Turbo"

  - priority: 0
    name: default
    condition: "true"
    action: glm-5
    description: "매칭 없으면 GLM-5"

# ──────────────────────────────────────────────
# 신호 추출 가중치
# ──────────────────────────────────────────────
signal_weights:
  lexical:
    word_count_200: 2
    word_count_500: 3
    code_blocks_2: 1
    file_paths_3: 2
    architecture_keywords: 3
    debugging_keywords: 2
    reasoning_keywords: 3          # "증명", "알고리즘", "복잡도", "수학", "최적화", "정합성"
    simple_keywords: -2

  structural:
    subtask_2_5: 2
    subtask_6_plus: 4
    cross_file: 2
    test_required: 1
    difficult_revert: 2
    system_wide_impact: 3

  context:
    previous_failures_2: 2
    conversation_turns_10: 1
    plan_steps_5: 2
    agent_chain_depth_2: 1

# ──────────────────────────────────────────────
# 한국어 감지 설정
# ──────────────────────────────────────────────
korean_detection:
  enabled: true
  thresholds:
    low: 0.3
    medium: 0.5
    high: 0.7
  coding_override: true

# ──────────────────────────────────────────────
# 추론 집약(reasoning-heavy) 감지 설정
# ──────────────────────────────────────────────
# reasoning_heavy == true 일 때 우선순위 규칙 P81/P82 가 활성화되어
# reasoning_score 최상위 모델(glm-5.1 / gpt-5.4-codex)로 라우팅됩니다.
reasoning_detection:
  enabled: true
  min_score: 2                   # 아래 신호 합산이 2 이상이면 heavy 로 판정
  signals:
    # 한국어 키워드
    keywords_ko:
      - "증명"
      - "알고리즘"
      - "복잡도"
      - "수학"
      - "최적화"
      - "정합성"
      - "상태 머신"
      - "동형"
      - "불변조건"
      - "race condition"
      - "분산 합의"
      - "정렬 증명"
    # 영문 키워드
    keywords_en:
      - "prove"
      - "proof"
      - "invariant"
      - "complexity"
      - "big-?o"
      - "algorithm"
      - "optimization"
      - "theorem"
      - "derive"
      - "analyze.+tradeoff"
      - "race condition"
      - "distributed consensus"
    # 카테고리 힌트
    categories: [reasoning, coding_arch, data_analysis, security]
    # 구조 힌트
    structural:
      cross_file_3plus: 1
      subtask_5plus: 1
      architecture_keywords_2plus: 1

# ──────────────────────────────────────────────
# 프롬프트 적응 (티어별)
# ──────────────────────────────────────────────
prompt_adaptation:
  LOW:
    strategy: concise
    max_thinking: null
    instructions: "직접적으로 답하라. 최소한의 출력."
  MEDIUM:
    strategy: balanced
    max_thinking: brief
    instructions: "체계적으로 접근하되 효율적으로. 핵심에 집중."
  HIGH:
    strategy: thorough
    max_thinking: extended
    instructions: "깊이 분석하라. 대안을 제시하고 트레이드오프를 설명하라."
