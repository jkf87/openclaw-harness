# OpenClaw 하네스 — 계정 풀 (Z.ai 코딩플랜 + 선택 Codex OAuth)
# Z.ai는 OAuth/API key 둘 다 지원. ChatGPT Codex는 OAuth만.
#
# 인증 방식 (auth_type):
#   oauth_codex     → CODEX_HOME 디렉토리 (예: ~/.codex, ~/.codex-acct2)
#   oauth_zai       → OpenClaw onboard 후 발급된 ANTHROPIC_AUTH_TOKEN
#   api_key         → 환경변수 (ZAI_API_KEY 등)
#
# 다중 계정 등록 예:
#   1) 새 OAuth 디렉토리에서 로그인:
#        CODEX_HOME=~/.codex-acct2 codex login
#   2) 본 파일 pools 리스트에 항목 추가
#   3) ./scripts/account-pool-demo.sh 로 검증
version: "2.0-zai-multitier"

# ──────────────────────────────────────────────
# 글로벌 풀 설정
# ──────────────────────────────────────────────
pool_defaults:
  strategy: round_robin
  cooldown_seconds: 60
  max_cooldown_seconds: 600
  backoff_multiplier: 2
  health_check_interval: 300
  fan_out_timeout: 30
  state_file: "state/account-pool-state.json"

# ──────────────────────────────────────────────
# 프로바이더별 계정 풀
# ──────────────────────────────────────────────
pools:
  # ════════════════════════════════════════════
  # Z.ai 코딩플랜 (필수) — 1순위
  # ════════════════════════════════════════════
  zai:
    base_url: https://api.z.ai/v1
    anthropic_base_url: https://api.z.ai/api/anthropic
    strategy: round_robin
    plan_aware: true                  # plans.yaml의 active_plan 참조
    accounts:
      # 메인 코딩플랜 계정 (OAuth 권장)
      - id: zai-primary
        auth_type: oauth_zai
        openclaw_profile: default     # ~/.openclaw/credentials
        plan: pro                     # lite | pro | max
        weight: 10
        enabled: true

      # 보조 API 키 계정 (선택)
      - id: zai-secondary
        auth_type: api_key
        env_key: ZAI_API_KEY_2
        plan: lite
        weight: 5
        enabled: false

      # 팀용 Max 플랜 계정 (선택)
      - id: zai-team-max
        auth_type: oauth_zai
        openclaw_profile: team
        plan: max
        weight: 15
        enabled: false

  # ════════════════════════════════════════════
  # OpenAI Codex (선택) — ChatGPT 구독 OAuth
  # ════════════════════════════════════════════
  codex:
    base_url: https://api.openai.com/v1
    strategy: round_robin
    optional: true                    # plans.yaml의 codex_oauth_enabled 로 토글
    accounts:
      - id: codex-primary
        auth_type: oauth_codex
        codex_home: ~/.codex
        weight: 10
        enabled: false                # codex login 후 true 로 변경

      - id: codex-secondary
        auth_type: oauth_codex
        codex_home: ~/.codex-acct2
        weight: 10
        enabled: false

  # ════════════════════════════════════════════
  # fan_out 예제 (대량 분산 작업용)
  # ════════════════════════════════════════════
  # zai-fanout:
  #   base_url: https://api.z.ai/v1
  #   strategy: fan_out
  #   accounts:
  #     - id: zai-fan-1
  #       auth_type: oauth_zai
  #       openclaw_profile: default
  #       plan: max
  #       weight: 10
  #       enabled: true
  #     - id: zai-fan-2
  #       auth_type: oauth_zai
  #       openclaw_profile: team
  #       plan: max
  #       weight: 10
  #       enabled: true
