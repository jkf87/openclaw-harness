# OpenClaw 하네스 — 모델 카탈로그
# ⚠️ Claude/Gemini 제외 — GLM-5-turbo, GLM-5, GPT-5.4-Codex 만 사용
version: "1.0"

models:
  # ──────────────────────────────────────────────
  # LOW 티어 — 단순 조회/포맷팅/번역/코드 주석
  # ──────────────────────────────────────────────
  glm-5-turbo:
    provider: zai
    display_name: "GLM-5 Turbo"
    tier: LOW
    cost_per_1k_input: 0.0003       # USD
    cost_per_1k_output: 0.0006
    max_context: 128000
    strengths:
      - fast_response
      - korean_native              # 한국어 네이티브 수준
      - low_cost
    weaknesses:
      - complex_reasoning
      - architecture_design
    korean_score: 95                # 0-100
    coding_score: 70
    reasoning_score: 60

  # ──────────────────────────────────────────────
  # MEDIUM 티어 (코딩 특화) — 구현/디버깅/리팩토링
  # ──────────────────────────────────────────────
  gpt-5.4-codex:
    provider: openai-codex
    display_name: "GPT-5.4 Codex"
    tier: MEDIUM
    cost_per_1k_input: 0.003
    cost_per_1k_output: 0.015
    max_context: 200000
    strengths:
      - code_generation
      - debugging
      - refactoring
      - architecture_design
    weaknesses:
      - korean_generation           # 한국어 생성은 중간
    korean_score: 70
    coding_score: 95
    reasoning_score: 90

  # ──────────────────────────────────────────────
  # MEDIUM 티어 (한국어 특화) — 한국어 NLP/문서/번역
  # ──────────────────────────────────────────────
  glm-5:
    provider: zai
    display_name: "GLM-5"
    tier: MEDIUM
    cost_per_1k_input: 0.002
    cost_per_1k_output: 0.008
    max_context: 128000
    strengths:
      - korean_native
      - general_reasoning
      - balanced_cost
      - content_creation
    weaknesses:
      - complex_architecture
    korean_score: 95
    coding_score: 80
    reasoning_score: 80

# ──────────────────────────────────────────────
# 프로바이더 설정
# ──────────────────────────────────────────────
providers:
  zai:
    type: api_key
    key_env: ZAI_API_KEY
    base_url: https://api.z.ai/v1
    models: [glm-5-turbo, glm-5]

  openai-codex:
    type: api_key
    key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    models: [gpt-5.4-codex]

# ──────────────────────────────────────────────
# 폴백 체인 (Claude/Gemini 제외 버전)
# ──────────────────────────────────────────────
fallback_chains:
  coding:
    primary: gpt-5.4-codex
    fallbacks:
      - glm-5                      # Z.ai 대체
      - glm-5-turbo                # 최후의 수단 (저비용)

  korean:
    primary: glm-5
    fallbacks:
      - glm-5-turbo                # 같은 프로바이더, 저렴한 모델
      - gpt-5.4-codex              # 한국어 기본 수준

  reasoning:
    primary: gpt-5.4-codex
    fallbacks:
      - glm-5                      # 추론 양호
      - glm-5-turbo                # 대체

  default:
    primary: gpt-5.4-codex
    fallbacks:
      - glm-5
      - glm-5-turbo
