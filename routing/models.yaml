# OpenClaw 하네스 — 모델 카탈로그
# ✅ 1순위: Z.ai 코딩플랜 GLM 시리즈 (Lite/Pro/Max)
# ✅ 2순위: OpenAI Codex OAuth (ChatGPT Plus/Pro 구독 기반, 선택)
# ❌ 비활성: Anthropic Claude / Google Gemini (직접 API)
#
# Z.ai 코딩플랜 가입: https://z.ai/subscribe?ic=OTYO9JPFNV
#   - lite : $3/월   (GLM-5-turbo, GLM-5)
#   - pro  : $15/월  (+ GLM-5.1)
#   - max  : $30/월  (전 모델 + 최대 quota + 우선 슬롯)
#
# Codex OAuth: `codex login` 으로 ChatGPT 계정 인증 (CODEX_HOME 디렉토리)
version: "2.0-zai-multitier"

models:
  # ════════════════════════════════════════════════
  # Z.ai GLM 시리즈
  # ════════════════════════════════════════════════

  # ──────────────────────────────────────────────
  # LOW — 빠른 응답/한국어 기본/포맷팅
  # 모든 코딩플랜 티어에서 사용 가능 (Lite/Pro/Max)
  # ──────────────────────────────────────────────
  glm-5-turbo:
    provider: zai
    display_name: "GLM-5 Turbo"
    tier: LOW
    cost_per_1k_input: 0              # 코딩플랜 정액
    cost_per_1k_output: 0
    max_context: 128000
    strengths: [fast_response, korean_native, low_cost]
    weaknesses: [complex_reasoning, architecture_design]
    korean_score: 95
    coding_score: 70
    reasoning_score: 60
    plans: [lite, pro, max]
    anthropic_alias: haiku

  # ──────────────────────────────────────────────
  # MEDIUM — 한국어 NLP/일반 코딩/구현/디버깅
  # 모든 코딩플랜 티어에서 사용 가능
  # ──────────────────────────────────────────────
  glm-5:
    provider: zai
    display_name: "GLM-5"
    tier: MEDIUM
    cost_per_1k_input: 0
    cost_per_1k_output: 0
    max_context: 128000
    strengths: [korean_native, general_coding, balanced_reasoning, content_creation]
    weaknesses: [deep_architecture]
    korean_score: 95
    coding_score: 88
    reasoning_score: 82
    plans: [lite, pro, max]
    anthropic_alias: sonnet

  # ──────────────────────────────────────────────
  # HIGH — 코딩 플래그십 / 리뷰 / 아키텍처 / 보안
  # Pro 이상에서만 사용 가능
  # ──────────────────────────────────────────────
  glm-5.1:
    provider: zai
    display_name: "GLM-5.1"
    tier: HIGH
    cost_per_1k_input: 0
    cost_per_1k_output: 0
    max_context: 204800
    strengths:
      - advanced_reasoning
      - code_generation
      - code_review
      - architecture_design
      - security_audit
      - korean_native
      - long_context
      - extended_thinking
    weaknesses: [higher_latency, lite_plan_excluded]
    korean_score: 96
    coding_score: 95
    reasoning_score: 95
    reasoning_mode: true              # 확장 사고(extended thinking) 지원
    plans: [pro, max]                 # ⚠️ Lite 플랜에서는 사용 불가
    anthropic_alias: opus

  # ════════════════════════════════════════════════
  # OpenAI Codex (선택) — ChatGPT Plus/Pro OAuth
  # GPT-5.4 Codex = 최신 플래그십. extended thinking 강화,
  # 코딩/디버깅/보안/수학 추론에서 GLM-5.1 동급 이상.
  # ════════════════════════════════════════════════
  gpt-5.4-codex:
    provider: openai-codex
    display_name: "GPT-5.4 Codex"
    tier: HIGH
    cost_per_1k_input: 0              # ChatGPT 구독 정액
    cost_per_1k_output: 0
    max_context: 256000
    strengths:
      - code_generation
      - debugging
      - refactoring
      - architecture_design
      - security_audit
      - advanced_reasoning
      - extended_thinking
      - math_reasoning
    weaknesses: [korean_generation_mid]
    korean_score: 72
    coding_score: 97
    reasoning_score: 97               # GPT-5.4는 extended thinking 특화
    reasoning_mode: true
    auth: oauth_codex                 # codex login (CODEX_HOME)
    optional: true                    # Z.ai 단독 사용도 OK
    plans: [oauth]

# ──────────────────────────────────────────────
# 프로바이더
# ──────────────────────────────────────────────
providers:
  zai:
    type: oauth_or_api_key
    key_env: ZAI_API_KEY
    base_url: https://api.z.ai/v1
    anthropic_base_url: https://api.z.ai/api/anthropic
    auth_env: ANTHROPIC_AUTH_TOKEN
    plans:
      lite:
        price_usd_month: 3
        models: [glm-5-turbo, glm-5]
        daily_token_budget: 1500000
        max_concurrent_workers: 2
      pro:
        price_usd_month: 15
        models: [glm-5-turbo, glm-5, glm-5.1]
        daily_token_budget: 8000000
        max_concurrent_workers: 4
      max:
        price_usd_month: 30
        models: [glm-5-turbo, glm-5, glm-5.1]
        daily_token_budget: 25000000
        max_concurrent_workers: 7
        priority_slot: true

  openai-codex:
    type: oauth
    auth: codex_login                 # CODEX_HOME 기반
    base_url: https://api.openai.com/v1
    models: [gpt-5.3-codex]
    optional: true

# ──────────────────────────────────────────────
# 폴백 체인 (플랜별)
# ──────────────────────────────────────────────
fallback_chains:
  # Lite — GLM-5.1 없음
  coding_lite:
    primary: glm-5
    fallbacks: [glm-5-turbo]

  korean_lite:
    primary: glm-5
    fallbacks: [glm-5-turbo]

  reasoning_lite:
    primary: glm-5
    fallbacks: [glm-5-turbo]

  # Pro/Max — GLM-5.1 사용 가능
  coding:
    primary: glm-5.1
    fallbacks: [glm-5, glm-5-turbo]

  korean:
    primary: glm-5.1
    fallbacks: [glm-5, glm-5-turbo]

  reasoning:
    primary: glm-5.1
    fallbacks: [glm-5, glm-5-turbo]

  # Codex OAuth가 함께 켜진 경우 — 코딩/보안에 우선 사용
  coding_with_codex:
    primary: gpt-5.3-codex
    fallbacks: [glm-5.1, glm-5, glm-5-turbo]

  security_with_codex:
    primary: gpt-5.3-codex
    fallbacks: [glm-5.1, glm-5]

  default:
    primary: glm-5
    fallbacks: [glm-5.1, glm-5-turbo]
