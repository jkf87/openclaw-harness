# OpenClaw 하네스 — 예산 프로파일
# 프로바이더 횡단 토큰 예산 관리
version: "1.0"

# ──────────────────────────────────────────────
# 예산 프로파일
# ──────────────────────────────────────────────
budget_profiles:
  minimal:
    description: "개인/학습용 — 비용 최소화"
    daily_limit: 500000             # 토큰
    session_limit: 100000
    task_limit: 30000
    preferred_tier: LOW             # 가능하면 저렴한 모델 우선
    cost_daily_limit: 1.00          # USD

  standard:
    description: "팀/프로덕션 — 균형 잡힌 비용"
    daily_limit: 2000000
    session_limit: 500000
    task_limit: 100000
    preferred_tier: null            # 복잡도 기반 자동 선택
    cost_daily_limit: 10.00

  full:
    description: "무제한/엔터프라이즈 — 성능 우선"
    daily_limit: null               # 무제한
    session_limit: 2000000
    task_limit: 500000
    preferred_tier: null
    cost_daily_limit: null

# ──────────────────────────────────────────────
# 예산 초과 처리 전략
# ──────────────────────────────────────────────
budget_policy:
  warning_threshold: 0.80          # 80% 도달 → 경고
  downgrade_threshold: 0.95        # 95% 도달 → LOW 티어 강제
  block_threshold: 1.00            # 100% 도달 → 새 태스크 차단

  actions:
    at_warning:
      - "경고 메시지 출력"
      - "가능하면 한 단계 낮은 모델로 전환"

    at_downgrade:
      - "LOW 티어 모델 강제 (glm-5-turbo)"
      - "사용자에게 예산 경고 알림"

    at_block:
      - "새 태스크 차단"
      - "현재 진행 중인 태스크만 완료 허용"
      - "사용자에게 예산 소진 알림"

# ──────────────────────────────────────────────
# 모델별 비용 참조 (models.yaml과 동기화)
# ──────────────────────────────────────────────
cost_reference:
  glm-5-turbo:
    input_per_1k: 0.0003
    output_per_1k: 0.0006
  gpt-5.4-codex:
    input_per_1k: 0.003
    output_per_1k: 0.015
  glm-5:
    input_per_1k: 0.002
    output_per_1k: 0.008
